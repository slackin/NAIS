# Convey Image Paste Board - Apache Reverse Proxy
# Include this inside the convey.pugbot.net VirtualHost block:
#   Include /etc/convey-images/apache-convey-proxy.conf

ProxyPreserveHost On

# Convey image service routes
ProxyPass /upload http://127.0.0.1:8844/upload
ProxyPassReverse /upload http://127.0.0.1:8844/upload

ProxyPass /i/ http://127.0.0.1:8844/i/
ProxyPassReverse /i/ http://127.0.0.1:8844/i/

ProxyPass /v/ http://127.0.0.1:8844/v/
ProxyPassReverse /v/ http://127.0.0.1:8844/v/

ProxyPass /delete/ http://127.0.0.1:8844/delete/
ProxyPassReverse /delete/ http://127.0.0.1:8844/delete/

ProxyPass /api/ http://127.0.0.1:8844/api/
ProxyPassReverse /api/ http://127.0.0.1:8844/api/

ProxyPass /gallery http://127.0.0.1:8844/gallery
ProxyPassReverse /gallery http://127.0.0.1:8844/gallery
