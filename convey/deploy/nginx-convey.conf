server {
    listen 80;
    server_name convey.pugbot.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name convey.pugbot.net;

    # TLS certificates (Let's Encrypt / certbot)
    ssl_certificate /etc/letsencrypt/live/convey.pugbot.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/convey.pugbot.net/privkey.pem;

    # Upload size limit (match server config)
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8844;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for large uploads
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Cache served images at the Nginx level
    location /i/ {
        proxy_pass http://127.0.0.1:8844;
        proxy_set_header Host $host;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
